<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&amp;family=Instrument+Serif:ital@0;1&amp;family=Space+Mono:wght@400;700&amp;display=swap">
  <style>
    :root{
      --bg:#F7F1EE; --surface:#FFFFFF; --tile:#F1E5DF;
      --ink:#573631; --ink-soft:#A28A82; --ink-soft2:#7C625A;
      --line:rgba(87,54,49,.10); --line-strong:rgba(87,54,49,.18);
      --accent:#EC85CC; --accent-soft:#FFD8F6; --accent-ink:#4A2436;
      --accent-pour:#DCEAA9; --accent-pour-strong:#6F8A04;
      --accent-wait:#FFD0AF; --accent-wait-strong:#A53F00;
      --tag-v60:#DCEAA9; --tag-aeropress:#FFD0AF; --tag-frenchpress:#FFD8F6;
      --on-accent:#573631;
      --ic1-bg:#FFD0AF; --ic1-fg:#A53F00;
      --ic2-bg:#DCEAA9; --ic2-fg:#6F8A04;
      --ic3-bg:#FFD8F6; --ic3-fg:#C44D9A;
      --fill-liquid:#6E4327; --fill-liquid-2:rgba(110,67,39,.4);
      --radius-lg:12px; --radius-md:10px; --radius-sm:8px;
      --font-display:'Instrument Serif',Georgia,serif;
      --font-body:'Hanken Grotesk',system-ui,Segoe UI,sans-serif;
      --font-mono:'Space Mono',ui-monospace,SFMono-Regular,monospace;
      --maxw:430px;
    }
    html.dark{
      --bg:#1C1518; --surface:#271E22; --tile:#2F242A;
      --ink:#F4E9E5; --ink-soft:#A8908A; --ink-soft2:#C6ADA6;
      --line:rgba(244,233,229,.10); --line-strong:rgba(244,233,229,.20);
      --accent:#6298EC; --accent-soft:#182848; --accent-ink:#0C1830;
      --accent-pour:#39481F; --accent-pour-strong:#BBD06A;
      --accent-wait:#4C351F; --accent-wait-strong:#F2A368;
      --tag-v60:#39481F; --tag-aeropress:#4C351F; --tag-frenchpress:#1A2C4C;
      --on-accent:#F4E9E5;
      --ic1-bg:#3E2A1E; --ic1-fg:#F2A368;
      --ic2-bg:#2F3720; --ic2-fg:#BBD06A;
      --ic3-bg:#162440; --ic3-fg:#7ABCF4;
      --fill-liquid:#B5754A; --fill-liquid-2:rgba(181,117,74,.4);
    }
    html{transition:background-color .25s ease;}
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;min-height:100vh;}
    button{font-family:inherit;}
    p{margin:0;}
    .num{font-variant-numeric:tabular-nums;}
    .app{max-width:var(--maxw);margin:0 auto;padding:0 20px 56px;min-height:100vh;}
    .icon{display:inline-flex;width:15px;height:15px;flex:0 0 auto;color:currentColor;}
    .icon svg{width:100%;height:100%;}

    .topbar{display:flex;align-items:center;justify-content:space-between;padding:24px 2px 18px;}
    .topbar-id{display:flex;align-items:baseline;gap:9px;}
    .logo{font-family:var(--font-display);font-weight:400;font-style:italic;font-size:30px;letter-spacing:.01em;cursor:pointer;text-decoration:none;color:inherit;background:none;border:none;padding:0;line-height:1;}
    .logo:hover{opacity:.7;}
    .tagline{font-family:var(--font-mono);font-size:9px;color:var(--ink-soft);font-weight:400;text-transform:uppercase;letter-spacing:.1em;}
    .topbar-controls{display:flex;align-items:center;gap:8px;}
    .lang-switch{display:flex;border:1.5px solid var(--line-strong);border-radius:8px;overflow:hidden;}
    .lang-switch button{font-family:var(--font-mono);padding:5px 10px;font-size:10px;font-weight:700;background:none;border:none;color:var(--ink-soft);cursor:pointer;}
    .lang-switch button.active{background:var(--ink);color:var(--bg);}
    .theme-toggle{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--line-strong);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);flex:0 0 auto;}
    .theme-toggle:hover{border-color:var(--ink);color:var(--ink);}

    .section{padding:18px 2px;}
    .section + .section{border-top:1px solid var(--line);}
    .eyebrow{font-family:var(--font-mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-soft);margin:0 0 13px;}

    .tag-pill{display:inline-block;font-family:var(--font-mono);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:3px 8px;border-radius:5px;color:var(--on-accent);}
    .tag-v60{background:var(--tag-v60);} .tag-aeropress{background:var(--tag-aeropress);} .tag-frenchpress{background:var(--tag-frenchpress);}

    .recipe-select{position:relative;}
    .recipe-select-trigger{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--tile);border:none;border-radius:var(--radius-md);padding:15px 16px;cursor:pointer;text-align:left;color:var(--ink);}
    .recipe-select-trigger .left{display:flex;align-items:center;gap:9px;min-width:0;}
    .recipe-select-trigger .rname{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .recipe-select-trigger .chevron{transition:transform .2s ease;flex:0 0 auto;color:var(--ink-soft);}
    .recipe-select.open .chevron{transform:rotate(180deg);}
    .recipe-select.locked .recipe-select-trigger{opacity:.5;pointer-events:none;}
    .recipe-panel{margin-top:8px;border-radius:var(--radius-md);overflow:hidden;background:var(--tile);}
    .recipe-row{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;}
    .recipe-row + .recipe-row{border-top:1px solid var(--line);}
    .recipe-row:hover{background:var(--surface);}
    .recipe-row .rinfo{flex:1;min-width:0;color:var(--ink);}
    .recipe-row .rname{display:block;font-weight:700;font-size:15px;}
    .recipe-row .rauthor{display:block;font-size:12px;color:var(--ink-soft);margin-top:3px;}
    .recipe-row .soon{font-size:9px;color:var(--ink-soft);text-transform:uppercase;font-weight:700;letter-spacing:.06em;}

    .illustration-zone{text-align:center;padding-top:4px;}
    .illustration-frame{max-width:282px;margin:0 auto;position:relative;}
    .illustration-frame::before{content:"";position:absolute;left:50%;top:47%;transform:translate(-50%,-50%);width:250px;height:250px;border-radius:50%;background:var(--accent-soft);z-index:0;}
    .illustration-frame svg{position:relative;z-index:1;width:100%;height:auto;display:block;}
    .illustration-caption{margin-top:14px;min-height:18px;text-align:center;font-family:var(--font-display);font-style:italic;font-size:18px;color:var(--ink-soft2);}
    .cap-name{display:block;font-family:var(--font-display);font-style:normal;font-size:26px;line-height:1.08;color:var(--ink);letter-spacing:.01em;}
    .cap-soon{font-family:var(--font-mono);font-size:11px;color:var(--ink-soft);letter-spacing:0;}
    .cap-author{display:block;font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin-top:8px;}

    .stats-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .stat{position:relative;background:var(--tile);border-radius:var(--radius-md);padding:14px 15px;text-align:left;}
    .stat.stat-dark{background:var(--accent);color:var(--accent-ink);}
    .stat-head{display:flex;align-items:center;gap:5px;margin-bottom:7px;}
    .stat-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);}
    .stat-dark .stat-label{color:var(--accent-ink);opacity:.66;}
    .stat-value{display:block;font-family:var(--font-mono);font-weight:700;font-size:23px;line-height:1.08;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
    .stat-text .stat-value{font-family:var(--font-body);font-size:16px;font-weight:700;letter-spacing:0;line-height:1.14;}
    .info-btn{width:15px;height:15px;border-radius:50%;border:1.3px solid var(--line-strong);background:none;font-size:9px;font-weight:700;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;padding:0;line-height:1;}
    .stat-dark .info-btn{border-color:rgba(74,36,54,.4);color:var(--accent-ink);}
    .info-btn.active,.info-btn:hover{border-color:currentColor;color:var(--ink);}
    .stat-dark .info-btn.active,.stat-dark .info-btn:hover{color:var(--accent-ink);}
    .info-panel-hover{display:none;}
    @media (hover: hover){ .stat:hover .info-panel-hover{display:block;} }
    .info-panel{font-size:11.5px;color:var(--ink-soft);line-height:1.5;margin-top:10px;padding:10px 12px;background:var(--surface);border-radius:var(--radius-sm);}
    .stat .info-panel-hover{position:absolute;left:0;right:0;top:calc(100% + 6px);z-index:6;background:var(--ink);color:var(--bg);box-shadow:0 14px 30px rgba(0,0,0,.22);}

    @keyframes sectionIn{from{transform:translateY(8px);}to{transform:translateY(0);}}
    .fade-in{animation:sectionIn .3s ease;}

    .tip-text{font-size:12.5px;color:var(--ink-soft);line-height:1.55;}

    .prep-list{list-style:none;margin:0 0 18px;padding:0;}
    .prep-item{display:flex;align-items:center;gap:13px;padding:13px 15px;font-size:14.5px;line-height:1.4;background:var(--tile);border-radius:var(--radius-sm);}
    .prep-item + .prep-item{margin-top:8px;}
    .prep-item-icon{width:40px;height:40px;border-radius:8px;background:var(--bg);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
    .prep-item-icon .icon{width:18px;height:18px;color:var(--ink-soft);}
    .prep-item.tone1 .prep-item-icon{background:var(--ic1-bg);} .prep-item.tone1 .prep-item-icon .icon{color:var(--ic1-fg);}
    .prep-item.tone2 .prep-item-icon{background:var(--ic2-bg);} .prep-item.tone2 .prep-item-icon .icon{color:var(--ic2-fg);}
    .prep-item.tone3 .prep-item-icon{background:var(--ic3-bg);} .prep-item.tone3 .prep-item-icon .icon{color:var(--ic3-fg);}

    .stepper-card{background:var(--tile);border-radius:var(--radius-md);padding:4px 16px;}
    .stepper-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;}
    .stepper-row + .stepper-row{border-top:1px solid var(--line);}
    .stepper-row .label{font-size:15px;font-weight:600;max-width:175px;line-height:1.25;}
    .stepper{display:flex;align-items:center;gap:6px;}
    .stepper-btn{width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);flex:0 0 auto;}
    .stepper-btn:last-child{background:var(--ink);color:var(--bg);}
    .stepper-btn:active{transform:scale(.92);}
    .stepper-input-wrap{display:flex;align-items:baseline;gap:2px;min-width:50px;justify-content:flex-start;}
    .stepper-input{font-family:var(--font-mono);font-size:14px;font-weight:700;width:38px;text-align:left;border:none;background:none;color:var(--ink);padding:0;-moz-appearance:textfield;font-variant-numeric:tabular-nums;}
    .stepper-input::-webkit-outer-spin-button,.stepper-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
    .stepper-input:focus{outline:none;}
    .stepper-unit,.stepper-prefix{font-size:13px;color:var(--ink-soft);font-weight:600;}

    .seg-block{padding:14px 0 0;}
    .seg-block .label{font-size:15px;font-weight:600;margin-bottom:11px;}
    .seg{display:flex;gap:7px;}
    .seg button{flex:1;padding:10px 4px;border-radius:8px;border:1.5px solid var(--line-strong);background:none;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;}
    .seg button.active{background:var(--ink);border-color:var(--ink);color:var(--bg);}
    .seg-block .micro{font-size:12.5px;color:var(--ink-soft2);margin-top:11px;line-height:1.5;}

    .bslider{position:relative;padding:4px 0 8px;}
    .bslider-labels{position:relative;height:15px;margin:0 11px 14px;}
    .bslider-label{position:absolute;top:0;font-family:var(--font-mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-soft);opacity:.35;white-space:nowrap;cursor:pointer;user-select:none;transition:opacity .2s ease,color .2s ease;}
    .bslider-label.active{opacity:1;color:var(--accent);}
    .bslider-track{position:relative;height:6px;border-radius:5px;background:var(--tile);margin:0 11px;cursor:pointer;touch-action:none;}
    .bslider-fill{position:absolute;top:0;left:0;height:100%;border-radius:5px;background:var(--accent);transition:width .18s ease;}
    .bslider-thumb{position:absolute;top:50%;width:20px;height:20px;border-radius:6px;background:var(--accent);border:3px solid var(--surface);box-shadow:0 1px 5px rgba(0,0,0,.2);transform:translate(-50%,-50%);transition:left .18s ease;cursor:grab;touch-action:none;}
    .bslider-thumb:active{cursor:grabbing;}
    .bslider-track.dragging .bslider-thumb,.bslider-track.dragging .bslider-fill{transition:none;}
    .bslider-thumb:focus-visible{outline:2px solid var(--accent);outline-offset:3px;}

    .pour-toc{list-style:none;margin:0;padding:0;}
    .toc-row{display:flex;align-items:center;gap:14px;padding:14px 15px;border-radius:10px;background:var(--tile);transition:opacity .25s ease,background .25s ease;}
    .toc-row + .toc-row{margin-top:9px;}
    .toc-num{font-family:var(--font-mono);font-weight:700;font-size:15px;width:32px;height:32px;border-radius:7px;background:var(--bg);color:var(--ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto;font-variant-numeric:tabular-nums;}
    .toc-spacer{flex:1;}
    .toc-value{font-family:var(--font-mono);font-size:15px;font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums;color:var(--ink);}
    .toc-value .sep{color:var(--ink-soft);font-weight:400;margin:0 6px;}
    .toc-row.current{background:var(--accent-soft);}
    .toc-row.current.state-pour{box-shadow:inset 4px 0 0 var(--accent-pour-strong);}
    .toc-row.current.state-wait{box-shadow:inset 4px 0 0 var(--accent-wait-strong);}
    .toc-row.done{opacity:.5;}
    .toc-row.done .toc-num{text-decoration:line-through;}

    .timer-pills{display:flex;gap:10px;margin-bottom:12px;}
    .brew-progress{height:8px;border-radius:5px;background:var(--tile);overflow:hidden;margin-bottom:18px;}
    .brew-progress-fill{display:block;height:100%;width:0;border-radius:5px;background:var(--accent);transition:width .25s linear;}
    .pill{flex:1;display:flex;align-items:center;gap:8px;background:var(--tile);border-radius:var(--radius-md);padding:11px 13px;}
    .pill .icon{color:var(--ink-soft);}
    .pill-text{display:flex;flex-direction:column;line-height:1.15;}
    .pill-label{font-family:var(--font-mono);font-size:8px;font-weight:400;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);}
    .pill-value{font-family:var(--font-mono);font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}

    .timer-main{text-align:center;margin-bottom:4px;}
    .timer-state-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:7px;font-family:var(--font-mono);font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--on-accent);}
    .timer-state-pill.state-pour{background:var(--accent-pour);} .timer-state-pill.state-wait{background:var(--accent-wait);}
    .timer-big{display:block;font-family:var(--font-mono);font-weight:700;font-size:58px;line-height:1.02;margin:12px 0 2px;letter-spacing:-.04em;font-variant-numeric:tabular-nums;}
    .timer-sub{font-size:15px;font-weight:600;color:var(--ink-soft);}
    .timer-sub-pour{font-family:var(--font-mono);font-size:16px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;}
    .timer-controls{display:flex;gap:8px;justify-content:center;margin-top:20px;}
    .ctrl-btn{width:48px;height:48px;border-radius:10px;border:none;background:var(--tile);cursor:pointer;color:var(--ink);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
    .ctrl-btn .icon{width:17px;height:17px;}
    .ctrl-btn:hover{background:var(--line);}
    .ctrl-btn:active{transform:scale(.93);}
    .ctrl-btn.muted{background:var(--ink);color:var(--bg);}

    .countdown-num{font-family:var(--font-mono);font-weight:700;font-size:66px;text-align:center;margin:8px 0;font-variant-numeric:tabular-nums;}
    .countdown-label{font-family:var(--font-mono);text-align:center;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-size:11px;color:var(--ink-soft);}

    .feedback-zone{margin-top:22px;padding-top:18px;border-top:1px solid var(--line);}
    .feedback-cta{display:flex;align-items:center;gap:12px;cursor:pointer;background:var(--tile);border:none;border-radius:var(--radius-md);padding:14px 16px;width:100%;text-align:left;color:var(--ink);}
    .feedback-cta-icon{width:36px;height:36px;border-radius:8px;background:var(--ic3-bg);display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
    .feedback-cta-icon .icon{width:16px;height:16px;color:var(--ic3-fg);}
    .feedback-cta-text{flex:1;display:flex;flex-direction:column;}
    .feedback-cta-title{font-weight:700;font-size:13.5px;}
    .feedback-cta-sub{font-size:11.5px;color:var(--ink-soft);margin-top:8px;}
    .feedback-cta-chevron{transition:transform .2s ease;color:var(--ink-soft);}
    .feedback-cta.open .feedback-cta-chevron{transform:rotate(180deg);}
    .feedback-body{margin-top:18px;}
    .feedback-preset{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px;margin-bottom:20px;padding:12px 14px;background:var(--tile);border-radius:var(--radius-sm);}
    .feedback-preset .fp-title{width:100%;font-family:var(--font-mono);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);margin-bottom:2px;}
    .feedback-preset .fp-chip{display:inline-flex;align-items:baseline;gap:6px;}
    .feedback-preset .fp-chip + .fp-chip{padding-left:12px;border-left:1px solid var(--line);}
    .feedback-preset .fp-k{font-size:11px;color:var(--ink-soft);}
    .feedback-preset .fp-v{font-size:13px;font-weight:700;color:var(--ink);}
    .feedback-q{margin-bottom:22px;}
    .feedback-q .qlabel{font-size:12.5px;font-weight:700;margin-bottom:11px;}
    .feedback-q .seg{flex-wrap:wrap;gap:7px;}
    .feedback-q .seg button{flex:unset;padding:9px 14px;border-radius:8px;font-size:12.5px;font-weight:600;border:1.5px solid var(--line-strong);background:none;color:var(--ink-soft);cursor:pointer;}
    .feedback-q .seg button.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}
    .feedback-q .tip{font-size:12px;color:var(--ink);line-height:1.55;margin-top:11px;padding:11px 13px;background:var(--accent-wait);border-radius:var(--radius-sm);}
    .feedback-note{font-size:10.5px;color:var(--ink-soft);font-style:italic;margin-top:8px;padding-top:14px;border-top:1px solid var(--line);}

    .done-banner{text-align:center;padding:6px 0 2px;}
    .done-icon{display:block;width:44px;height:44px;margin:2px auto 12px;color:var(--accent);}
    .done-icon svg{width:100%;height:100%;}
    .done-banner h2{font-family:var(--font-display);font-style:italic;font-weight:400;font-size:36px;margin:0 0 6px;letter-spacing:0;}
    .done-banner p{font-size:13px;color:var(--ink-soft);margin-bottom:18px;}
    .done-actions{display:flex;gap:9px;}

    .btn{border:none;border-radius:8px;padding:16px 20px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:var(--font-body);}
    .btn-primary{background:var(--accent);color:var(--accent-ink);}
    .btn-primary:active{transform:scale(.985);}
    .btn-ghost{background:none;border:1.5px solid var(--line-strong);color:var(--ink);}
    .btn:focus-visible,.seg button:focus-visible,.stepper-btn:focus-visible,.recipe-select-trigger:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

    .footer{text-align:center;margin-top:30px;font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.1em;font-weight:600;}

    .ink-stroke{stroke:var(--ink);} .ink-fill{fill:var(--ink);} .paper-fill{fill:var(--bg);}
    .soft-stroke{stroke:var(--ink-soft);} .line-stroke{stroke:var(--line-strong);}

    .kettle-group{transform-origin:302px 90px;transform:rotate(0deg);transition:transform .55s cubic-bezier(.4,0,.2,1);}
    .scene.ready .kettle-group{transform:rotate(-9deg);}
    .scene.pouring .kettle-group{transform:rotate(-20deg);}
    .stream{opacity:0;transition:opacity .2s ease;}
    .scene.pouring .stream{opacity:1;animation:flow .5s linear infinite;}
    @keyframes flow{to{stroke-dashoffset:-22;}}

function setMode(mode){
  state.mode = mode;
  var showStats = mode==="configuring";
  var showSettings = mode==="configuring";
  var showPrep = mode==="prep";
  var showTimer = mode==="countdown" || mode==="brewing";
  var showToc = mode==="configuring" || mode==="countdown" || mode==="brewing" || mode==="done";
  var showDone = mode==="done";
  var showCta = mode==="configuring";
  var lockRecipe = mode==="prep";
  reveal("statsSection", showStats);
  reveal("settingsSection", showSettings);
  reveal("prepSection", showPrep);
  reveal("timerSection", showTimer);
  reveal("tocSection", showToc);
  reveal("doneSection", showDone);
  reveal("ctaSection", showCta);
  $("#recipeSelect").classList.toggle("locked", lockRecipe);
}
function reveal(id, show){
  var el = $("#"+id);
  var wasHidden = el.hidden;
  el.hidden = !show;
  if(show && wasHidden){ el.classList.remove("fade-in"); void el.offsetWidth; el.classList.add("fade-in"); }
}

function openPanel(){
  if((state.brew.running || state.mode==="countdown") && state.mode!=="idle"){
    if(!confirm(t("brew.cancelConfirm"))) return;
    state.brew.running = false;
    if(typeof brewInterval !== "undefined") clearInterval(brewInterval);
    if(typeof countdownInterval !== "undefined") clearInterval(countdownInterval);
    if(sceneEl) sceneEl.classList.remove("brewing","pouring","ready");
    if(cupFillEl) cupFillEl.style.transform = "scaleY(0)";
    if(dripperFillEl) dripperFillEl.style.transform = "scaleY(0)";
    if(plungerEl) plungerEl.style.transform = "translateY(0px)";
    $("#recipeSelect").classList.remove("locked");
  }
  $("#recipePanel").hidden=false; $("#recipeSelect").classList.add("open");
}
function closePanel(){ $("#recipePanel").hidden=true; $("#recipeSelect").classList.remove("open"); }

function selectRecipe(id){
  if(state.brew.running) return;
  state.selectedRecipe = id;
  state.customName = null;
  var r = RECIPES.filter(function(x){ return x.id===id; })[0];
  $("#recipeTriggerLabel").innerHTML = '<span class="tag-pill '+r.tagClass+'" style="margin-right:8px;">'+r.device+'</span>'+r.name[state.lang];
  var cap = $("#illustrationCaption");
  cap.innerHTML = captionHTML(r);
  var descLine=document.getElementById("recipeDescLine"); if(descLine){ descLine.textContent=r.desc&&r.status==="live"?r.desc[state.lang]:""; descLine.hidden=!r.desc||r.status!=="live"; }
  if(r.status === "live"){
    state.activeType = r.type;
    mountScene(r.type);
    var isSimple=r.type==="frenchpress"||r.type==="10pour"||r.type==="hoffmann";
    $("#balanceBlock").hidden = isSimple;
    $("#strengthBlock").hidden = isSimple;
    $("#fpNote").hidden = r.type!=="frenchpress";
    var n1=document.getElementById("hv60Note"); if(n1) n1.hidden=r.type!=="hoffmann";
    var n2=document.getElementById("tenPourNote"); if(n2) n2.hidden=r.type!=="10pour";

    recompute();
  } else {
    setMode("idle");
    $("#recipeTriggerLabel").innerHTML += ' <span style="color:var(--ink-soft);font-weight:400;">· '+t("badge.soon")+'</span>';
  }
}

function compute46(p){
  var totalWater = p.volume;
  var dose = totalWater / p.ratio;
  var phase1 = totalWater * 0.4, phase2 = totalWater * 0.6;
  var firstFrac = 0.5 + p.balance * 0.167;
  var pours = [ {amount:phase1*firstFrac}, {amount:phase1*(1-firstFrac)} ];
  var each2 = phase2 / p.pours2;
  for(var i=0;i<p.pours2;i++) pours.push({amount:each2});
  var cum = 0;
  pours.forEach(function(pour,i){ cum += pour.amount; pour.cumulative = cum; pour.start = i*45; pour.duration = 10; pour.kind = "pour"; });
  var drainStart = pours[pours.length-1].start + 10;
  pours.push({ kind:"drain", labelKey:"step.drain", start:drainStart, duration:45, cumulative:null });
  var finishTime = drainStart + 45;
  return { type:"46", totalWater:totalWater, dose:dose, pours:pours, finishTime:finishTime, temp:FIXED_TEMP+roastOffset() };
}
function compute10Pour(p){
  var totalWater=p.volume, dose=totalWater/p.ratio, perPour=Math.round(totalWater/10), cumulative=0, pours=[];
  for(var i=0;i<10;i++){
    var start=(i===0)?0:(i===1)?30:30+(i-1)*15;
    cumulative+=perPour;
    pours.push({kind:"pour",start:start,duration:10,amount:perPour,cumulative:cumulative});
  }
  pours.push({kind:"drain",labelKey:"step.drain",start:160,duration:50});
  return{type:"10pour",totalWater:totalWater,dose:dose,pours:pours,finishTime:210,temp:95+roastOffset(),grindKey:"10pour.grindWord"};
}
function computeHoffmannV60(p){
  var totalWater=p.volume, dose=totalWater/p.ratio;
  var bloomAmt=Math.round(dose*2), firstTarget=Math.round(totalWater*0.6);
  var pours=[
    {kind:"pour",   start:0,   duration:10, amount:bloomAmt,                 cumulative:bloomAmt},
    {kind:"action", start:10,  duration:35,                                   labelKey:"hv60.swirl1"},
    {kind:"pour",   start:45,  duration:30, amount:firstTarget-bloomAmt,     cumulative:firstTarget,  labelKey:"hv60.pour1"},
    {kind:"pour",   start:75,  duration:30, amount:totalWater-firstTarget,   cumulative:totalWater,   labelKey:"hv60.pour2"},
    {kind:"action", start:105, duration:20,                                   labelKey:"hv60.finish"},
    {kind:"drain",  start:125, duration:85,                                   labelKey:"step.drain"}
  ];
  return{type:"hoffmann",totalWater:totalWater,dose:dose,pours:pours,finishTime:210,temp:95+roastOffset(),grindKey:"hv60.grindWord"};
}
function computeFrenchPress(p){
  var totalWater = p.volume;
  var dose = totalWater / p.ratio;
  var pours = [
    { kind:"pour",   labelKey:"fp.stepPour",   start:0,   duration:30, amount:totalWater, cumulative:totalWater },
    { kind:"wait",   labelKey:"fp.stepSteep",  start:30,  duration:210 },
    { kind:"action", labelKey:"fp.stepSkim",   start:240, duration:45  },
    { kind:"wait",   labelKey:"fp.stepRest",   start:285, duration:300 },
    { kind:"action", labelKey:"fp.stepPlunge", start:585, duration:20  }
  ];
  var finishTime = 605;
  return { type:"frenchpress", totalWater:totalWater, dose:dose, pours:pours, finishTime:finishTime, temp:93+roastOffset(), grindKey:"fp.grindWord" };
}
function recompute(){
  if(state.activeType==="frenchpress") state.computed=computeFrenchPress(state.params);
  else if(state.activeType==="10pour") state.computed=compute10Pour(state.params);
  else if(state.activeType==="hoffmann") state.computed=computeHoffmannV60(state.params);
  else state.computed=compute46(state.params);
  renderSummary();
  renderToc();
}

function renderToc(liveElapsed, finished){

    list.appendChild(li);

function wireSetupControls(){
  function clampVol(v){ return Math.max(150, Math.min(600, v)); }
  function clampRatio(v){ return Math.max(8, Math.min(22, Math.round(v*2)/2)); }
  $("#volMinus").addEventListener("click", function(){ state.params.volume = clampVol(state.params.volume-10); recompute(); });
  $("#volPlus").addEventListener("click", function(){ state.params.volume = clampVol(state.params.volume+10); recompute(); });
  $("#volValue").addEventListener("change", function(e){ var v = parseInt(e.target.value,10); state.params.volume = clampVol(isNaN(v) ? state.params.volume : v); recompute(); });
  $("#ratioMinus").addEventListener("click", function(){ state.params.ratio = clampRatio(state.params.ratio-0.5); recompute(); });
  $("#ratioPlus").addEventListener("click", function(){ state.params.ratio = clampRatio(state.params.ratio+0.5); recompute(); });
  $("#ratioValue").addEventListener("change", function(e){ var v = parseFloat(e.target.value); state.params.ratio = clampRatio(isNaN(v) ? state.params.ratio : v); recompute(); });
  function buildSlider(cfg){
    var track=$("#"+cfg.track), fill=$("#"+cfg.fill), thumb=$("#"+cfg.thumb), labelsEl=$("#"+cfg.labels);
    function render(){
      var stops=cfg.stops, names=cfg.names(), n=stops.length;
      var idx=stops.indexOf(cfg.get()); if(idx<0) idx=0;
      var p = n>1 ? (idx/(n-1))*100 : 0;
      fill.style.width = p+"%"; thumb.style.left = p+"%"; thumb.setAttribute("aria-valuenow", idx);
      labelsEl.innerHTML="";
      names.forEach(function(lab,i){
        var s=document.createElement("span");
        s.className="bslider-label"+(i===idx?" active":"");
        s.textContent=lab;
        var pp = n>1 ? (i/(n-1))*100 : 0;
        if(i===0){ s.style.left="0"; }
        else if(i===n-1){ s.style.right="0"; }
        else { s.style.left=pp+"%"; s.style.transform="translateX(-50%)"; }
        s.addEventListener("click", function(){ cfg.set(stops[i]); recompute(); render(); });
        labelsEl.appendChild(s);
      });
    }
    function setFromX(clientX){
      var rect=track.getBoundingClientRect(); if(!rect.width) return;
      var frac=Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));
      var n=cfg.stops.length, idx=Math.round(frac*(n-1));
      if(cfg.get()!==cfg.stops[idx]){ cfg.set(cfg.stops[idx]); recompute(); }
      render();
    }
    var dragging=false;
    track.addEventListener("pointerdown", function(e){ dragging=true; track.classList.add("dragging"); try{track.setPointerCapture(e.pointerId);}catch(_){} setFromX(e.clientX); });
    track.addEventListener("pointermove", function(e){ if(dragging) setFromX(e.clientX); });
    track.addEventListener("pointerup", function(){ dragging=false; track.classList.remove("dragging"); });
    track.addEventListener("pointercancel", function(){ dragging=false; track.classList.remove("dragging"); });
    thumb.addEventListener("keydown", function(e){
      var n=cfg.stops.length, idx=cfg.stops.indexOf(cfg.get()); if(idx<0) idx=0;
      if(e.key==="ArrowLeft"||e.key==="ArrowDown"){ idx=Math.max(0,idx-1); }
      else if(e.key==="ArrowRight"||e.key==="ArrowUp"){ idx=Math.min(n-1,idx+1); }
      else return;
      e.preventDefault(); cfg.set(cfg.stops[idx]); recompute(); render();
    });
    return { render:render };
  }
  var balanceSlider = buildSlider({ track:"balanceTrack", fill:"balanceFill", thumb:"balanceThumb", labels:"balanceLabels", stops:[-1,0,1], names:function(){return BAL_LABELS[state.lang];}, get:function(){return state.params.balance;}, set:function(v){state.params.balance=v;} });
  var strengthSlider = buildSlider({ track:"strengthTrack", fill:"strengthFill", thumb:"strengthThumb", labels:"strengthLabels", stops:[1,2,3,4], names:function(){return BODY_LABELS[state.lang];}, get:function(){return state.params.pours2;}, set:function(v){state.params.pours2=v;} });
  function renderSliders(){ balanceSlider.render(); strengthSlider.render(); }
  renderSliders();
  window.__applySegLabels = renderSliders;
}

function ensureAudio(){
  if(!state.audioCtx){ try{ state.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }catch(e){} }
  if(state.audioCtx && state.audioCtx.state === "suspended"){ state.audioCtx.resume(); }
}
function cue(type){
  if(state.brew.muted || !state.audioCtx) return;
  var ctx = state.audioCtx;
  function tone(freq, start, dur, vol){
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = freq; g.gain.value = 0.0001;
    o.connect(g); g.connect(ctx.destination);
    var now = ctx.currentTime + start;
    g.gain.exponentialRampToValueAtTime(vol, now+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
    o.start(now); o.stop(now+dur+0.02);
  }
  if(type==="go"){ tone(880,0,0.32,0.18); if(navigator.vibrate) navigator.vibrate(180); }
  else if(type==="tick"){ tone(660,0,0.1,0.11); }
  else if(type==="headsup"){ tone(760,0,0.13,0.09); if(navigator.vibrate) navigator.vibrate(50); }
  else if(type==="done"){ tone(880,0,0.22,0.17); tone(1180,0.18,0.3,0.17); if(navigator.vibrate) navigator.vibrate([90,60,140]); }
}

var brewInterval=null, countdownInterval=null;

function findStage(elapsed){
  var pours = state.brew.recipe.pours;
  var idx = 0;
  for(var i=0;i<pours.length;i++){ if(pours[i].start <= elapsed) idx = i; }
  var cur = pours[idx];
  var dur = cur.duration || 10;
  var active = elapsed < cur.start + dur;
  var nextMilestone = active ? cur.start+dur : ((idx+1<pours.length) ? pours[idx+1].start : state.brew.recipe.finishTime);
  return { idx:idx, cur:cur, active:active, prevMilestone:cur.start, nextMilestone:nextMilestone };
}
function computeFracs46(elapsed, st){
  var recipe = state.brew.recipe, total = recipe.totalWater, pours = recipe.pours, idx = st.idx;
  var prevCum = 0;
  for(var j=idx-1;j>=0;j--){ if(pours[j].cumulative!=null){ prevCum = pours[j].cumulative; break; } }
  var curCum = pours[idx].cumulative!=null ? pours[idx].cumulative : prevCum;
  var isPour = (pours[idx].kind === "pour");
  var cycleStart = pours[idx].start, cycleEnd = st.nextMilestone;
  var pourDur = pours[idx].duration || 10;
  var cycleFrac = (cycleEnd>cycleStart) ? Math.max(0,Math.min(1,(elapsed-cycleStart)/(cycleEnd-cycleStart))) : 1;
  var cupFrac = Math.min(1, (prevCum + (curCum-prevCum)*cycleFrac)/total);
  var dripperFrac;
  if(st.active && isPour){ dripperFrac = Math.max(0,Math.min(1,(elapsed-cycleStart)/pourDur)); }
  else { var waitStart=isPour?cycleStart+pourDur:cycleStart, waitDur=cycleEnd-waitStart; var waitFrac = waitDur>0 ? Math.max(0,Math.min(1,(elapsed-waitStart)/waitDur)) : 1; dripperFrac = 1-waitFrac; }
  return { cupFrac:cupFrac, dripperFrac:dripperFrac };
}
function applyVisuals46(elapsed, st, finished){
  var fracs = computeFracs46(elapsed, st);
  if(sceneEl){
    sceneEl.classList.toggle("pouring", st.active && st.cur.kind==="pour" && !finished);
    if(cupFillEl) cupFillEl.style.transform = "scaleY("+(finished?1:fracs.cupFrac)+")";
    if(dripperFillEl) dripperFillEl.style.transform = "scaleY("+(finished?0:fracs.dripperFrac)+")";
  }
}
function applyVisualsFP(elapsed, st, finished){
  if(!sceneEl) return;
  var pours = state.brew.recipe.pours;
  var pourStep = pours[0], plungeStep = pours[pours.length-1];
  sceneEl.classList.toggle("pouring", st.active && st.cur.kind==="pour" && !finished);
  var carafeFrac = finished ? 1 : Math.max(0, Math.min(1, elapsed<=pourStep.start ? 0 : (elapsed-pourStep.start)/pourStep.duration));
  if(cupFillEl) cupFillEl.style.transform = "scaleY("+carafeFrac+")";
  var plungeFrac = 0;
  if(finished){ plungeFrac = 1; }
  else if(elapsed >= plungeStep.start){ plungeFrac = Math.max(0, Math.min(1, (elapsed-plungeStep.start)/plungeStep.duration)); }
  if(plungerEl) plungerEl.style.transform = "translateY("+(plungeFrac*86)+"px)";
}
function nextStepDescription(pours, idx){
  var next = pours[idx+1];
  if(!next) return t("brew.waitLabelEnd");
  return next.labelKey ? t(next.labelKey) : fmt(t("brew.waitLabel"), {n: idx+2});
}

  },1000);

function actuallyStartBrewClock(){
  state.brew.running=true; state.brew.paused=false; state.brew.startTs=performance.now();
  state.brew.pausedAccum=0; state.brew.offset=0; state.brew.elapsed=0;
  state.brew.doneShown=false; state.brew.lastTrigger=""; state.brew.lastHeadsupKey="";
  setIcon("iconPause","pause");
  sceneEl.classList.add("brewing");
  if(brewInterval) clearInterval(brewInterval);
  brewInterval = setInterval(tickBrew, 150);
  updateBrewUI(0);

function tickBrew(){
  if(!state.brew.running) return;
  if(!state.brew.paused){ state.brew.elapsed = (performance.now()-state.brew.startTs-state.brew.pausedAccum)/1000 + state.brew.offset; }
  updateBrewUI(state.brew.elapsed);
}
function updateBrewUI(elapsed){
  if(!state.brew.recipe) return;
  var pours = state.brew.recipe.pours, finishTime = state.brew.recipe.finishTime;
  var st = findStage(elapsed);
  var finished = elapsed >= finishTime;
  var isPourNow = st.active && st.cur.kind==="pour";
  var isActionNow = st.active && (st.cur.kind==="action" || st.cur.kind==="drain");
  var isGoMoment = (isPourNow || isActionNow) && !finished;
  var triggerKey = st.idx+"-"+st.active+"-"+st.cur.kind;
  if(triggerKey !== state.brew.lastTrigger && isGoMoment){ cue("go"); }
  state.brew.lastTrigger = triggerKey;
  if(!isPourNow && !isActionNow && !finished){
    var remain = st.nextMilestone - elapsed;
    var headsupKey = st.idx+"-headsup";
    if(remain<=3 && remain>0 && state.brew.lastHeadsupKey!==headsupKey){ cue("headsup"); state.brew.lastHeadsupKey = headsupKey; }
  }
  $("#pillTotal").textContent = mmss(elapsed);
  $("#pillPosition").textContent = fmt(t("brew.positionLabel"), {i:st.idx+1, n:pours.length});
  var __pb = document.getElementById("brewProgressFill"); if(__pb){ __pb.style.width = Math.max(0, Math.min(100, (elapsed/finishTime)*100)) + "%"; }
  var pill = $("#timerStatePill");
  if(finished){ pill.textContent=""; pill.className="timer-state-pill"; $("#timerBig").textContent=""; $("#timerSub").textContent=""; }
  else if(isPourNow){
    pill.textContent = t("brew.pouringState"); pill.className="timer-state-pill state-pour";
    var remainP = Math.max(0, Math.ceil((st.cur.start+st.cur.duration)-elapsed));
    $("#timerBig").textContent = remainP;
    $("#timerSub").innerHTML = (st.cur.cumulative!=null) ? '<span class="timer-sub-pour">'+fmt(t("brew.pourLabel"), {x:Math.round(st.cur.cumulative)+"g"})+'</span>' : "";
  } else if(isActionNow){
    pill.textContent = t(st.cur.labelKey); pill.className="timer-state-pill state-wait";
    var remainA = Math.max(0, Math.ceil((st.cur.start+st.cur.duration)-elapsed));
    $("#timerBig").textContent = remainA; $("#timerSub").textContent = "";
  } else {
    pill.textContent = t("brew.waitingState"); pill.className="timer-state-pill state-wait";
    $("#timerBig").textContent = mmss(st.nextMilestone-elapsed);
    $("#timerSub").textContent = nextStepDescription(pours, st.idx);
  }
  renderToc(elapsed);
  if(state.activeType === "frenchpress"){ applyVisualsFP(elapsed, st, finished); } else { applyVisuals46(elapsed, st, finished); }
  if(finished && !state.brew.doneShown){
    state.brew.doneShown = true; state.brew.running = false;
    clearInterval(brewInterval);
    setMode("done");
    sceneEl.classList.remove("pouring");
    renderToc(elapsed, true);
    renderFeedback();
    $("#feedbackBody").hidden = true;
    cue("done");
    triggerDoneAnim();
    saveBrewToHistory();
  }
}

}

function triggerDoneAnim(){
  var ring=document.querySelector('#iconDone .done-ring');
  var check=document.querySelector('#iconDone .done-check');
  if(!ring||!check) return;
  ring.classList.remove('run'); check.classList.remove('run');
  void ring.offsetWidth;
  setTimeout(function(){ ring.classList.add('run'); check.classList.add('run'); },30);
}

// ── Local Storage ──
var LS_RECIPES="bloom_saved_recipes", LS_HISTORY="bloom_brew_history";
function lsGet(key){ try{ return JSON.parse(localStorage.getItem(key)||"null"); }catch(e){ return null; } }
function lsSet(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch(e){} }
function getSavedRecipes(){ return lsGet(LS_RECIPES)||[]; }
function getBrewHistory(){ return lsGet(LS_HISTORY)||[]; }
function escHtml(str){ return str.replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }

function saveCurrentRecipe(){
  if(!state.computed||!state.activeType) return;
  var name=window.prompt(t("myRecipes.prompt"));
  if(!name||!name.trim()) return;
  var recipes=getSavedRecipes();
  recipes.unshift({id:"r_"+Date.now(),name:name.trim(),type:state.activeType,recipeId:state.selectedRecipe,savedAt:Date.now(),params:{volume:state.params.volume,ratio:state.params.ratio,balance:state.params.balance,pours2:state.params.pours2,roast:state.params.roast||"medium"}});
  lsSet(LS_RECIPES,recipes);
  renderMyRecipes();
}
function loadSavedRecipe(r){
  selectRecipe(r.recipeId||r.type);
  setTimeout(function(){ state.params.volume=r.params.volume||300; state.params.ratio=r.params.ratio||15; state.params.balance=r.params.balance||0; state.params.pours2=r.params.pours2||3; state.params.roast=r.params.roast||"medium"; state.customName=r.name||null; $all("#roastSeg button").forEach(function(b){ b.classList.toggle("active",b.getAttribute("data-roast")===state.params.roast); }); recompute(); if(window.__applySegLabels) window.__applySegLabels(); },60);
}
function deleteSavedRecipe(id){
  lsSet(LS_RECIPES,getSavedRecipes().filter(function(r){ return r.id!==id; }));
  renderMyRecipes();
}
function saveBrewToHistory(){
  if(!state.computed||!state.activeType) return;
  var r=RECIPES.filter(function(x){ return x.id===state.selectedRecipe; })[0];
  var history=getBrewHistory();
  history.unshift({completedAt:Date.now(),type:state.activeType,recipeId:state.selectedRecipe,recipeName:r?r.name:{pt:state.activeType,en:state.activeType,es:state.activeType},params:{volume:state.params.volume,ratio:state.params.ratio,balance:state.params.balance,pours2:state.params.pours2}});
  if(history.length>20) history=history.slice(0,20);
  lsSet(LS_HISTORY,history);
  renderBrewHistory();
  renderPreferenceProfile();
}
function renderMyRecipes(){ renderRecipePanel(); }
function renderBrewHistory(){
  var history=getBrewHistory();
  var section=document.getElementById("historySection");
  var list=document.getElementById("historyList");
  if(!section||!list) return;
  section.hidden=history.length===0;
  list.innerHTML="";
  history.slice(0,5).forEach(function(entry){
    var row=document.createElement("div"); row.className="history-row";
    var name=entry.recipeName?(entry.recipeName[state.lang]||entry.type):entry.type;
    var date=new Date(entry.completedAt);
    var dateStr=date.toLocaleDateString(state.lang==="pt"?"pt-BR":state.lang==="es"?"es":"en-US",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
    row.innerHTML='<span class="history-method">'+name+'</span><span class="history-date">'+dateStr+'</span>';
    list.appendChild(row);
  });
}
function generateShareText(){
  var c=state.computed; if(!c) return "";
  var r=RECIPES.filter(function(x){ return x.id===state.selectedRecipe; })[0]; if(!r) return "";
  var recipeName=state.customName||r.name[state.lang];
  var lines=["☕ BLOOM — "+recipeName,"",t("share.beanTemplate"),"",t("summary.dose")+": "+Math.round(c.dose)+"g",t("summary.water")+": "+Math.round(c.totalWater)+"ml",t("settings.ratio")+": 1:"+state.params.ratio,t("summary.temp")+": "+c.temp+"°C",t("summary.grind")+": "+t(state.computed.grindKey||"grindWord")];
  if(state.activeType==="46"){ lines.push(t("settings.balance")+": "+BAL_LABELS[state.lang][state.params.balance+1]); lines.push(t("settings.body")+": "+BODY_LABELS[state.lang][state.params.pours2-1]); }
  try{ var base=window.location.href.split("?")[0]; var p=new URLSearchParams({m:state.activeType,v:state.params.volume,r:state.params.ratio,b:state.params.balance,p:state.params.pours2,rt:state.params.roast||"medium"}); lines.push("",base+"?"+p.toString()); }catch(e){}
  return lines.join("\n");
}
function analyzePreferences(){
  var h=getBrewHistory().filter(function(x){ return x.type==="46"&&x.params; });
  if(h.length<3) return null;
  var n=Math.min(h.length,8),bs=0,ps=0;
  for(var i=0;i<n;i++){ bs+=h[i].params.balance||0; ps+=h[i].params.pours2||3; }
  return{balance:bs/n,body:ps/n,count:n};
}
function renderPreferenceProfile(){
  var section=document.getElementById("prefSection"); if(!section) return;
  var prefs=analyzePreferences(); section.hidden=!prefs; if(!prefs) return;
  var chips=document.getElementById("prefChips"); var meta=document.getElementById("prefMeta"); if(!chips||!meta) return;
  chips.innerHTML="";
  var items=[];
  if(prefs.balance<-0.3) items.push(t("pref.sweet")); else if(prefs.balance>0.3) items.push(t("pref.acidic")); else items.push(t("pref.balanced"));
  if(prefs.body<=1.7) items.push(t("pref.bodyLight")); else if(prefs.body<=2.7) items.push(t("pref.bodyMedium")); else items.push(t("pref.bodyFull"));
  items.forEach(function(label){ var chip=document.createElement("span"); chip.className="pref-chip"; chip.textContent="✓ "+label; chips.appendChild(chip); });
  meta.textContent=fmt(t("pref.basedOn"),{n:prefs.count});
}
function applyURLParams(){
  try{
    var p=new URLSearchParams(window.location.search); var m=p.get("m"); if(!m) return;
    var v=p.get("v"),r=p.get("r"),b=p.get("b"),pp=p.get("p"),rt=p.get("rt");
    if(v) state.params.volume=parseInt(v,10)||300;
    if(r) state.params.ratio=parseFloat(r)||15;
    if(b) state.params.balance=Math.max(-1,Math.min(1,parseInt(b,10)));
    if(pp) state.params.pours2=Math.max(1,Math.min(4,parseInt(pp,10)));
    if(rt) state.params.roast=rt;
    selectRecipe(m);
  }catch(e){}
}
function setTheme(dark){ document.documentElement.classList.toggle("dark", dark); setIcon("iconTheme", dark ? "sun" : "moon"); }

function setLang(lang){
  if(lang === state.lang) return;
  state.lang = lang;
  applyI18n(); renderRecipePanel(); window.__applySegLabels();
  $("#infoPanel").hidden = true;
  $all(".info-btn").forEach(function(b){ b.classList.remove("active"); });
  $("#pourInfoPanel").hidden = true;
  if(state.selectedRecipe){
    var r = RECIPES.filter(function(x){ return x.id===state.selectedRecipe; })[0];
    $("#recipeTriggerLabel").innerHTML = '<span class="tag-pill '+r.tagClass+'" style="margin-right:8px;">'+r.device+'</span>'+r.name[state.lang] + (r.status==="soon" ? ' <span style="color:var(--ink-soft);font-weight:400;">· '+t("badge.soon")+'</span>' : '');
    var cap = $("#illustrationCaption");
    cap.innerHTML = captionHTML(r);
    var dl=document.getElementById("recipeDescLine"); if(dl){ dl.textContent=r.desc&&r.status==="live"?r.desc[state.lang]:""; dl.hidden=!r.desc||r.status!=="live"; }
  }
  if(state.computed){ renderSummary(); populateHoverPanels(); }
  if(state.mode==="prep"){ showPrepChecklist(); }
  if(state.brew.recipe && state.brew.doneShown){ renderToc(state.brew.elapsed, true); renderFeedback(); $("#feedbackBody").hidden = true; }
  else if(state.brew.recipe && state.brew.running){ updateBrewUI(state.brew.elapsed); }
  else if(state.computed){ renderToc(); }
  renderMyRecipes(); renderBrewHistory(); renderPreferenceProfile();
}

function init(){
  mountScene("46");
  $("#illustrationCaption").textContent = t("illustration.idle");
  $("#recipeTriggerLabel").textContent = t("recipe.choose");
  setIcon("chevronIcon","chevron"); setIcon("iconDose","bean"); setIcon("iconTemp","thermo"); setIcon("iconGrind","grind");
  setIcon("iconClock","clock"); setIcon("iconDroplet","droplet"); setIcon("iconSpeaker","speaker"); setIcon("iconPause","pause"); setIcon("iconSkip","skipNext"); setIcon("iconHamburger","menu");
  renderRecipePanel(); applyI18n(); wireSetupControls(); wireBrewControls(); setMode("idle");
  closePanel();
  populateHoverPanels();
  $("#infoPanel").hidden = true; $("#pourInfoPanel").hidden = true;
  var isTouch = window.matchMedia && !window.matchMedia("(hover: hover)").matches;
  $all(".info-btn[data-info]").forEach(function(btn){
    btn.addEventListener("click", function(e){
      e.stopPropagation();
      if(!isTouch) return;
      var key = btn.getAttribute("data-info");
      var wasActive = btn.classList.contains("active");
      $all(".info-btn[data-info]").forEach(function(b){ b.classList.remove("active"); });
      if(wasActive){ $("#infoPanel").hidden = true; }
      else { btn.classList.add("active"); $("#infoPanel").textContent = t("info."+key); $("#infoPanel").hidden = false; }
    });
  });
  if($("#pourInfoBtn")) $("#pourInfoBtn").addEventListener("click", function(e){
    e.stopPropagation();
    var wasActive = $("#pourInfoBtn").classList.contains("active");
    $("#pourInfoBtn").classList.toggle("active", !wasActive);
    $("#pourInfoPanel").textContent = t("tip.text46");
    $("#pourInfoPanel").hidden = wasActive;
  });
  $("#recipeTrigger").addEventListener("click", function(e){ e.stopPropagation(); if($("#recipePanel").hidden){ openPanel(); } else { closePanel(); } });
  document.addEventListener("click", function(e){
    if(!$("#recipeSelect").contains(e.target)) closePanel();
    var mMenu=document.getElementById("mobileMenu");
    if(mMenu&&!mMenu.hidden&&!mMenu.contains(e.target)&&!e.target.closest("#hamburgerBtn")){ mMenu.hidden=true; setIcon("iconHamburger","menu"); }
    if(!e.target.closest(".slider-info-wrap")){ $all(".slider-info-btn.active").forEach(function(b){ b.classList.remove("active"); }); }
  });
  $all("#langSwitch button").forEach(function(btn){ btn.addEventListener("click", function(){ setLang(btn.getAttribute("data-lang")); }); });
  var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  setTheme(prefersDark);
  $("#themeToggle").addEventListener("click", function(){ setTheme(!document.documentElement.classList.contains("dark")); });
  $("#logoBtn").addEventListener("click", function(){
    if(state.brew.running || state.mode === "countdown"){
      if(!confirm(t("brew.cancelConfirm"))) return;
      state.brew.running = false;
      if(typeof brewInterval !== "undefined") clearInterval(brewInterval);
      if(typeof countdownInterval !== "undefined") clearInterval(countdownInterval);
      if(sceneEl) sceneEl.classList.remove("brewing","pouring","ready");
      if(cupFillEl) cupFillEl.style.transform = "scaleY(0)";
      if(dripperFillEl) dripperFillEl.style.transform = "scaleY(0)";
      if(plungerEl) plungerEl.style.transform = "translateY(0px)";
    }
    state.selectedRecipe = null; state.activeType = null; state.computed = null;
    state.brew.recipe = null; state.brew.doneShown = false;
    setMode("idle"); mountScene("46");
    $("#illustrationCaption").textContent = t("illustration.idle");
    $("#recipeTriggerLabel").textContent = t("recipe.choose");
    closePanel();
  });
  var mMenuInit=document.getElementById("mobileMenu"); if(mMenuInit) mMenuInit.hidden=true;
  var hmBtn=document.getElementById("hamburgerBtn");
  if(hmBtn){ hmBtn.addEventListener("click",function(e){ e.stopPropagation(); var mMenu=document.getElementById("mobileMenu"); var open=mMenu&&!mMenu.hidden; if(mMenu) mMenu.hidden=open; setIcon("iconHamburger",open?"menu":"close"); }); }
  var navBmcBtn=document.getElementById("navBmcBtn");
  var mobileBmcBtn=document.getElementById("mobileBmcBtn");
  function scrollToBmc(){ var bmc=document.getElementById("bmcSection"); if(!bmc) return; var top=bmc.getBoundingClientRect().top+window.pageYOffset-20; window.scrollTo({top:top,behavior:"smooth"}); }
  if(navBmcBtn) navBmcBtn.addEventListener("click",scrollToBmc);
  if(mobileBmcBtn) mobileBmcBtn.addEventListener("click",function(){ var m=document.getElementById("mobileMenu"); if(m) m.hidden=true; setIcon("iconHamburger","menu"); scrollToBmc(); });
  $all(".slider-info-btn").forEach(function(btn){ btn.addEventListener("click",function(e){ e.stopPropagation(); var isActive=btn.classList.contains("active"); $all(".slider-info-btn").forEach(function(b){ b.classList.remove("active"); }); if(!isActive) btn.classList.add("active"); }); });
  var saveBtn=document.getElementById("saveRecipeBtn"); if(saveBtn) saveBtn.addEventListener("click",saveCurrentRecipe);
  var navAboutBtn=document.getElementById("navAboutBtn");
  var mobileAboutBtn=document.getElementById("mobileAboutBtn");
  function scrollToAbout(){ var el=document.getElementById("aboutSection"); if(!el) return; var top=el.getBoundingClientRect().top+window.pageYOffset-20; window.scrollTo({top:top,behavior:"smooth"}); }
  if(navAboutBtn) navAboutBtn.addEventListener("click",scrollToAbout);
  if(mobileAboutBtn) mobileAboutBtn.addEventListener("click",function(){ var m=document.getElementById("mobileMenu"); if(m) m.hidden=true; setIcon("iconHamburger","menu"); scrollToAbout(); });
  renderMyRecipes(); renderBrewHistory(); renderPreferenceProfile(); applyURLParams();
  $all("#roastSeg button").forEach(function(btn){ if(btn.getAttribute("data-roast")===state.params.roast) btn.classList.add("active"); btn.addEventListener("click",function(){ state.params.roast=btn.getAttribute("data-roast"); $all("#roastSeg button").forEach(function(b){ b.classList.remove("active"); }); btn.classList.add("active"); recompute(); }); });
  var sharePanelEl=document.getElementById("sharePanel"); if(sharePanelEl) sharePanelEl.hidden=true;
  var shareBtn=document.getElementById("shareBtn"); if(shareBtn) shareBtn.addEventListener("click",function(){ if(!sharePanelEl) return; var opening=sharePanelEl.hidden; sharePanelEl.hidden=!opening; if(opening){ var ta=document.getElementById("shareTextArea"); if(ta) ta.value=generateShareText(); } });
  var shareClipBtn=document.getElementById("shareClipBtn"); if(shareClipBtn) shareClipBtn.addEventListener("click",function(){ var ta=document.getElementById("shareTextArea"); if(!ta) return; var orig=shareClipBtn.textContent; function afterCopy(){ shareClipBtn.textContent=t("share.copied"); setTimeout(function(){ shareClipBtn.textContent=orig; },2000); } if(navigator.clipboard){ navigator.clipboard.writeText(ta.value).then(afterCopy).catch(function(){ ta.select(); document.execCommand("copy"); afterCopy(); }); } else { ta.select(); document.execCommand("copy"); afterCopy(); } });
}
    if(typeof init === "function") init();
  }
}
</script>
</body>
</html>
